<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 200" width="900" height="200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="900" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#06090F"/>
      <stop offset="50%"  stop-color="#080C14"/>
      <stop offset="100%" stop-color="#050810"/>
    </linearGradient>
    <linearGradient id="ring-g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#06B6D4"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>
    <linearGradient id="wordmark" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#CBD5E1"/>
    </linearGradient>
    <linearGradient id="tag-g" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#06B6D4"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="textglow" x="-10%" y="-30%" width="120%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="200" rx="16" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g opacity="0.03" stroke="#06B6D4" stroke-width="0.8">
    <line x1="0"   y1="50"  x2="900" y2="50"/>
    <line x1="0"   y1="100" x2="900" y2="100"/>
    <line x1="0"   y1="150" x2="900" y2="150"/>
    <line x1="200" y1="0"   x2="200" y2="200"/>
    <line x1="450" y1="0"   x2="450" y2="200"/>
    <line x1="700" y1="0"   x2="700" y2="200"/>
  </g>

  <!-- Left ambient glow -->
  <ellipse cx="100" cy="100" rx="100" ry="75" fill="#06B6D4" opacity="0.04"/>
  <ellipse cx="100" cy="100" rx="55"  ry="40" fill="#6366F1" opacity="0.05"/>
  <!-- Right ambient -->
  <ellipse cx="800" cy="100" rx="80" ry="60" fill="#6366F1" opacity="0.04"/>

  <!-- Border -->
  <rect width="900" height="200" rx="16" fill="none" stroke="#06B6D4" stroke-width="1" opacity="0.2"/>

  <!-- ── Signal Ring Icon (centered at x=92, y=100) ── -->
  <g transform="translate(24, 30)" filter="url(#glow)">
    <!-- Outer ring -->
    <circle cx="68" cy="70" r="56" fill="none" stroke="url(#ring-g)" stroke-width="1.5" opacity="0.5"/>
    <!-- Mid ring -->
    <circle cx="68" cy="70" r="40" fill="none" stroke="url(#ring-g)" stroke-width="1.2" opacity="0.35"/>
    <!-- Inner ring -->
    <circle cx="68" cy="70" r="22" fill="none" stroke="url(#ring-g)" stroke-width="2" opacity="0.85"/>
    <!-- Center dot -->
    <circle cx="68" cy="70" r="8"  fill="#06B6D4" opacity="0.95"/>
    <circle cx="68" cy="70" r="3"  fill="white"   opacity="0.9"/>
    <!-- Radar arcs — top-right -->
    <path d="M 82 56 A 20 20 0 0 1 82 84" fill="none" stroke="#06B6D4" stroke-width="3"   stroke-linecap="round" opacity="0.75"/>
    <path d="M 92 46 A 34 34 0 0 1 92 94" fill="none" stroke="#6366F1" stroke-width="2"   stroke-linecap="round" opacity="0.45"/>
  </g>

  <!-- ── Wordmark ── -->
  <text
    x="178" y="115"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
    font-weight="300"
    font-size="74"
    letter-spacing="8"
    fill="url(#wordmark)"
    filter="url(#textglow)">SIGIL</text>

  <!-- Thin vertical separator -->
  <line x1="448" y1="52" x2="448" y2="148" stroke="#06B6D4" stroke-width="1" opacity="0.3"/>

  <!-- Right side taglines -->
  <text
    x="472" y="90"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
    font-size="17"
    font-weight="500"
    fill="#E2E8F0"
    opacity="0.92">Turn invisible expertise into tangible AI agents.</text>

  <text
    x="472" y="118"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
    font-size="13"
    font-weight="400"
    fill="url(#tag-g)"
    opacity="0.75"
    font-style="italic">The best engineers leave traces everywhere. Sigil reads them.</text>

  <!-- Bottom accent bar -->
  <rect x="178" y="138" width="90" height="2" rx="1" fill="url(#tag-g)" opacity="0.5"/>
</svg>
