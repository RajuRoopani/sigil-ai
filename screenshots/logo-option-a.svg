<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 120" width="480" height="120">
  <defs>
    <linearGradient id="hex-fill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <linearGradient id="text-grad-a" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#CBD5E1"/>
    </linearGradient>
    <filter id="shadow-a">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#6366F1" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="480" height="120" fill="#0F1117"/>

  <!-- Hexagon mark -->
  <g transform="translate(28, 12)" filter="url(#shadow-a)">
    <!-- Outer hex -->
    <polygon
      points="48,4 84,24 84,64 48,84 12,64 12,24"
      fill="none"
      stroke="url(#hex-fill)"
      stroke-width="2.5"
    />
    <!-- Inner hex (smaller, filled) -->
    <polygon
      points="48,20 68,31 68,53 48,64 28,53 28,31"
      fill="url(#hex-fill)"
      opacity="0.15"
    />
    <!-- Center dot cluster: 3 dots like a git branch -->
    <circle cx="48" cy="44" r="5" fill="url(#hex-fill)"/>
    <circle cx="35" cy="37" r="3" fill="#8B5CF6" opacity="0.7"/>
    <circle cx="61" cy="37" r="3" fill="#8B5CF6" opacity="0.7"/>
    <line x1="40" y1="40" x2="44" y2="43" stroke="#8B5CF6" stroke-width="1.5" opacity="0.6"/>
    <line x1="56" y1="40" x2="52" y2="43" stroke="#8B5CF6" stroke-width="1.5" opacity="0.6"/>
  </g>

  <!-- Wordmark -->
  <text
    x="126" y="68"
    font-family="'Segoe UI', -apple-system, system-ui, sans-serif"
    font-weight="600"
    font-size="42"
    letter-spacing="-0.5"
    fill="url(#text-grad-a)">SIGIL</text>

  <!-- Tagline -->
  <text
    x="127" y="92"
    font-family="'Segoe UI', -apple-system, system-ui, sans-serif"
    font-weight="400"
    font-size="13"
    letter-spacing="2.5"
    fill="#6366F1"
    opacity="0.85">DEVELOPER INTELLIGENCE</text>

  <!-- Subtle divider -->
  <line x1="126" y1="75" x2="328" y2="75" stroke="#6366F1" stroke-width="0.5" opacity="0.3"/>
</svg>
