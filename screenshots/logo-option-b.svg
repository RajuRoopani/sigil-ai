<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 120" width="480" height="120">
  <defs>
    <linearGradient id="ring-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06B6D4"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>
    <linearGradient id="word-b" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#F1F5F9"/>
      <stop offset="100%" stop-color="#94A3B8"/>
    </linearGradient>
    <filter id="glow-b">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="circle-clip">
      <circle cx="48" cy="48" r="38"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="480" height="120" fill="#080C14"/>

  <!-- Signal ring icon -->
  <g transform="translate(20, 12)" filter="url(#glow-b)">
    <!-- Outer ring -->
    <circle cx="48" cy="48" r="38" fill="none" stroke="url(#ring-grad)" stroke-width="1.8" opacity="0.6"/>
    <!-- Mid ring -->
    <circle cx="48" cy="48" r="28" fill="none" stroke="url(#ring-grad)" stroke-width="1.2" opacity="0.4"/>
    <!-- Inner circle filled -->
    <circle cx="48" cy="48" r="14" fill="none" stroke="url(#ring-grad)" stroke-width="2" opacity="0.9"/>
    <circle cx="48" cy="48" r="6" fill="#06B6D4" opacity="0.9"/>

    <!-- Signal arcs — top right quadrant only, like a WiFi/radar signal -->
    <path d="M 62 34 A 20 20 0 0 1 62 62" fill="none" stroke="#06B6D4" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
    <path d="M 70 26 A 32 32 0 0 1 70 70" fill="none" stroke="#6366F1" stroke-width="2" stroke-linecap="round" opacity="0.45"/>
  </g>

  <!-- Wordmark -->
  <text
    x="122" y="62"
    font-family="'Segoe UI', -apple-system, system-ui, sans-serif"
    font-weight="300"
    font-size="46"
    letter-spacing="6"
    fill="url(#word-b)">SIGIL</text>

  <!-- Sub-label -->
  <text
    x="124" y="86"
    font-family="'Segoe UI', -apple-system, system-ui, sans-serif"
    font-weight="400"
    font-size="11.5"
    letter-spacing="3.5"
    fill="#06B6D4"
    opacity="0.75">TURN EXPERTISE INTO AI</text>
</svg>
